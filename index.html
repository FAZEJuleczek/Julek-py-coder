<!DOCTYPE html>
<html lang="pl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JulekPy | AI Interactive Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .ace_editor { border-radius: 8px; border: 1px solid #1e293b; }
        .ai-chat-bubble { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <header class="h-14 border-b border-purple-900/50 flex items-center justify-between px-6 bg-black">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(147,51,234,0.5)]">Γ</div>
            <span class="font-bold tracking-tighter">JULEKPY <span class="text-purple-500">GAMMA-4 AI</span></span>
        </div>
        <div id="status" class="text-[10px] uppercase tracking-widest text-purple-400 animate-pulse">AI Uplink: Active</div>
    </header>

    <main class="flex-1 grid grid-cols-[1fr_400px] overflow-hidden">
        
        <section class="flex flex-col p-4 gap-4 border-r border-slate-900">
            <div class="flex items-center justify-between">
                <h2 class="text-sm font-bold text-slate-500 uppercase">Python Workspace</h2>
                <button onclick="executeCode()" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2 rounded-md font-bold text-sm transition-all shadow-lg shadow-purple-900/20">
                    Uruchom Kod
                </button>
            </div>
            
            <div id="editor" class="flex-1 shadow-2xl"></div>
            
            <div class="h-48 bg-slate-950 border border-slate-900 rounded-lg p-3 font-mono text-xs overflow-y-auto" id="terminal">
                <div class="text-purple-400 italic">Czekam na uruchomienie skryptu...</div>
            </div>
        </section>

        <aside class="flex flex-col bg-slate-950/50">
            <div class="p-4 border-b border-slate-900 bg-slate-900/20">
                <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest">Gamma-4 AI Tutor</h3>
            </div>
            
            <div id="ai-chat" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
                <div class="ai-chat-bubble bg-purple-900/20 border border-purple-500/30 p-3 rounded-xl text-sm">
                    <p class="font-bold text-purple-400 mb-1">Γ GAMMA-4:</p>
                    Cześć Julek! Jestem gotowy. Co chcesz dzisiaj zhakować? Mogę wymyślić zadanie albo pomóc Ci z kodem.
                </div>
            </div>

            <div class="p-4 border-t border-slate-900 bg-black">
                <div class="flex gap-2">
                    <input id="ai-input" type="text" placeholder="Zapytaj o podpowiedź lub poproś o zadanie..." 
                           class="flex-1 bg-slate-900 border border-slate-800 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-purple-500">
                    <button onclick="askAI()" class="bg-slate-800 p-2 rounded-md hover:bg-slate-700 transition-colors">
                        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <script>
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/python");
        editor.setOptions({ fontSize: "14px", showPrintMargin: false });

        let pyodide;

        async function init() {
            pyodide = await loadPyodide();
            document.getElementById('status').innerText = "AI Uplink: Ready";
        }

        function addChatMessage(role, text) {
            const chat = document.getElementById('ai-chat');
            const div = document.createElement('div');
            const isAI = role === 'AI';
            div.className = `ai-chat-bubble p-3 rounded-xl text-sm ${isAI ? 'bg-purple-900/20 border border-purple-500/30' : 'bg-slate-800 self-end'}`;
            div.innerHTML = `<p class="font-bold ${isAI ? 'text-purple-400' : 'text-slate-400'} mb-1">${isAI ? 'Γ GAMMA-4' : 'JULEK'}:</p>${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // FUNKCJA ROZMOWY - To łączy się ze mną
        async function askAI() {
            const input = document.getElementById('ai-input');
            const userText = input.value;
            if(!userText) return;

            addChatMessage('User', userText);
            input.value = '';

            // Symulacja myślenia AI
            setTimeout(() => {
                let response = "";
                if(userText.toLowerCase().includes("zadanie")) {
                    response = "Jasne! Napisz program, który z listy <b>[10, 20, 30, 40]</b> wybierze tylko liczby większe niż 25 i wypisze je w konsoli.";
                } else if(userText.toLowerCase().includes("podpowiedź")) {
                    response = "Użyj pętli <b>for</b> oraz instrukcji <b>if</b>, żeby sprawdzić każdą liczbę.";
                } else {
                    response = "Analizuję Twój problem... Spróbuj uruchomić kod i zobaczmy, co wypluje terminal!";
                }
                addChatMessage('AI', response);
            }, 800);
        }

        async function executeCode() {
            const term = document.getElementById('terminal');
            term.innerHTML = "";
            let output = "";
            pyodide.setStdout({ batched: (str) => { output += str + "\n"; } });

            try {
                await pyodide.runPythonAsync(editor.getValue());
                term.innerHTML = `<div class="text-white">${output.replace(/\n/g, '<br>')}</div>`;
                // Automatycznie powiadom AI o wyniku (wersja uproszczona)
                if(output) addChatMessage('AI', "Widzę wynik w terminalu. Jeśli to jest to, co chciałeś osiągnąć, możemy przejść dalej!");
            } catch (e) {
                term.innerHTML = `<div class="text-red-500">BŁĄD: ${e.message}</div>`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
