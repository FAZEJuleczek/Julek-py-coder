<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JulekPy | C2 Connected Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.03); --gold: #ffae00; --err: #ff4444; --msg: #00ff41; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 1400px; border: 1px solid var(--neon); border-radius: 15px; padding: 20px; background: var(--card); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); margin: auto; }
        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Trzy kolumny: Misja | Edytor | Terminal */
        .grid { display: grid; grid-template-columns: 300px 1.2fr 0.8fr; gap: 15px; }
        
        .card { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; min-height: 550px; display: flex; flex-direction: column; }
        .label { font-size: 10px; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; display: block; text-transform: uppercase; border-bottom: 1px solid rgba(0, 242, 255, 0.1); padding-bottom: 5px; }
        
        #mission-box { color: var(--msg); font-size: 13px; line-height: 1.6; }
        #editor { flex-grow: 1; border-radius: 5px; border: 1px solid rgba(0, 242, 255, 0.2); font-size: 14px; }
        #terminal-stream { overflow-y: auto; flex-grow: 1; max-height: 480px; }
        
        .item { padding: 8px; margin-bottom: 8px; border-radius: 4px; font-size: 11px; border-left: 2px solid var(--neon); background: rgba(0, 242, 255, 0.03); }
        .success-item { border-left-color: var(--gold); color: #eee; }
        .error-item { border-left-color: var(--err); color: var(--err); }

        .btn-execute { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin-top: 15px; cursor: pointer; font-family: 'Consolas', monospace; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-execute:hover:not(:disabled) { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .btn-execute:disabled { opacity: 0.2; }

        .mission-status { color: var(--gold); font-size: 11px; margin-top: 10px; padding: 10px; background: rgba(255, 174, 0, 0.05); border: 1px dashed var(--gold); }

        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } .card { min-height: auto; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div style="color: var(--neon); font-weight: bold; letter-spacing: 3px;">JULEKPY_v2.1_CONNECTED</div>
            <div id="status-line" style="font-size: 8px; color: var(--gold); margin-top: 4px;">C2_LINK: WAITING_FOR_COMMAND...</div>
        </div>
        <div id="clock" style="font-size: 10px; opacity: 0.6;">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card">
            <span class="label">● C2_MISSION_CONTROL</span>
            <div id="mission-box">Oczekiwanie na rozkazy z serwera matki...</div>
            <div id="mission-meta" class="mission-status">STATUS: STANDBY</div>
        </div>

        <div class="card">
            <span class="label">● PAYLOAD_EDITOR</span>
            <div id="editor"># Czekaj na załadowanie silnika i misji...</div>
            <button class="btn-execute" id="run-btn" onclick="executeCode()" disabled>Engine Offline</button>
        </div>

        <div class="card">
            <span class="label">● TERMINAL_FEED</span>
            <div id="terminal-stream">
                <div class="item">Inicjowanie bezpiecznego łącza...</div>
            </div>
        </div>
    </div>
</div>

<script>
    var editor = ace.edit("editor");
    editor.setTheme("ace/theme/monokai");
    editor.session.setMode("ace/mode/python");
    editor.setOptions({ showPrintMargin: false, fontFamily: "Consolas", fontSize: "14px", useWorker: false });

    let pyodide;

    function addLog(text, type = 'normal') {
        const stream = document.getElementById('terminal-stream');
        const item = document.createElement('div');
        item.className = `item ${type === 'success' ? 'success-item' : (type === 'error' ? 'error-item' : '')}`;
        item.innerHTML = `<span style="opacity:0.4; font-size:9px;">[${new Date().toLocaleTimeString()}]</span><br>${text}`;
        stream.prepend(item); 
    }

    // Funkcja pobierająca zadania od "Gemini C2"
    async function fetchMission() {
        document.getElementById('status-line').innerText = "C2_LINK: SYNCING...";
        
        // Symulacja API Gemini - w przyszłości tu wstawisz URL do swojego JSONa na Vercelu/Githubie
        const mockAPI = {
            id: "M-001",
            title: "OPERACJA: RAM_CLEANER",
            description: "Wykryto proces 'intel_me.sys'. Musisz go odfiltrować z listy aktywnych usług systemowych.",
            template: "procesy = ['chrome.exe', 'intel_me.sys', 'spotify.exe', 'python.exe']\n\n# TWOJE ZADANIE: Stwórz nową listę bez 'intel_me.sys'\n# i wypisz ją poleceniem print()\n\nclean_list = [p for p in procesy if p != 'intel_me.sys']\nprint(f'OCZYSZCZONA LISTA: {clean_list}')"
        };

        setTimeout(() => {
            document.getElementById('mission-box').innerHTML = `<b>${mockAPI.title}</b><br><br>${mockAPI.description}`;
            document.getElementById('mission-meta').innerHTML = `MISSION_ID: ${mockAPI.id}<br>PRIORITY: CRITICAL`;
            editor.setValue(mockAPI.template);
            document.getElementById('status-line').innerText = "C2_LINK: CONNECTED_ACTIVE";
            addLog("Odebrano nowy payload z serwera!", "success");
        }, 2000);
    }

    async function initPython() {
        try {
            pyodide = await loadPyodide();
            document.getElementById('run-btn').disabled = false;
            document.getElementById('run-btn').innerText = "Execute Locally";
            addLog("Lokalne jądro Python 3.11 gotowe.", "success");
            fetchMission(); // Pobierz misję po załadowaniu silnika
        } catch (e) {
            addLog("BŁĄD krytyczny silnika.", "error");
        }
    }

    async function executeCode() {
        const code = editor.getValue();
        addLog("Uruchamianie lokalnego payloadu...");
        
        pyodide.setStdout({
            batched: (str) => {
                addLog("<b>[ OUTPUT ]</b>:<br>" + str.replace(/\n/g, '<br>'), "success");
            }
        });

        try {
            await pyodide.runPythonAsync(code);
        } catch (err) {
            addLog("<b>[ RUNTIME_ERROR ]</b>:<br>" + err.message, "error");
        }
    }

    window.onload = initPython;
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
