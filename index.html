<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JulekPy | Private C2 Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.03); --gold: #ffae00; --err: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 1200px; border: 1px solid var(--neon); border-radius: 15px; padding: 20px; background: var(--card); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); margin: auto; }
        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
        .card { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; min-height: 500px; display: flex; flex-direction: column; }
        .label { font-size: 10px; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; display: block; text-transform: uppercase; }
        #editor { flex-grow: 1; border-radius: 5px; border: 1px solid rgba(0, 242, 255, 0.2); font-size: 14px; min-height: 300px; }
        #terminal-stream { overflow-y: auto; flex-grow: 1; max-height: 450px; padding-right: 5px; }
        .item { padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 12px; line-height: 1.4; animation: fadeIn 0.3s ease; border-left: 3px solid var(--neon); background: rgba(0, 242, 255, 0.05); word-break: break-all; }
        .success-item { border-left: 3px solid var(--gold); background: rgba(255, 174, 0, 0.05); }
        .error-item { border-left: 3px solid var(--err); background: rgba(255, 68, 68, 0.05); color: var(--err); }
        .btn-execute { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin-top: 15px; cursor: pointer; font-family: 'Consolas', monospace; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-execute:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div style="color: var(--neon); font-weight: bold; letter-spacing: 3px;">JULEKPY_LAB_v1.1</div>
            <div id="status-line" style="font-size: 8px; color: var(--gold); margin-top: 4px;">ENGINE: AUTO_DETECTING...</div>
        </div>
        <div id="clock" style="font-size: 10px; opacity: 0.6;">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card">
            <span class="label">● SOURCE_CODE_INPUT (PYTHON)</span>
            <div id="editor">print("JulekPy Online!")
import sys
print(f"Running on Python {sys.version.split()[0]}")</div>
            <button class="btn-execute" onclick="executeCode()">Execute Payload</button>
        </div>

        <div class="card">
            <span class="label">● TERMINAL_OUTPUT_STREAM</span>
            <div id="terminal-stream">
                <div class="item">Inicjowanie systemu C2...</div>
            </div>
        </div>
    </div>
</div>

<script>
    var editor = ace.edit("editor");
    editor.setTheme("ace/theme/monokai");
    editor.session.setMode("ace/mode/python");
    editor.setOptions({ showPrintMargin: false, fontFamily: "Consolas", fontSize: "14px" });

    let pythonVersion = "3.10.0"; // Domyślna

    // Funkcja do logowania w terminalu
    function addLog(text, type = 'normal') {
        const stream = document.getElementById('terminal-stream');
        const item = document.createElement('div');
        item.className = `item ${type === 'success' ? 'success-item' : (type === 'error' ? 'error-item' : '')}`;
        item.innerHTML = `<span style="opacity:0.4; font-size:9px;">[${new Date().toLocaleTimeString()}]</span><br>${text}`;
        stream.prepend(item); 
    }

    // Automatyczne wykrywanie wersji Pythona na serwerze
    async function detectVersion() {
        try {
            const res = await fetch('https://emkc.org/api/v2/piston/versions');
            const data = await res.json();
            const py = data.find(l => l.language === 'python');
            if(py) {
                pythonVersion = py.version;
                document.getElementById('status-line').innerText = `ENGINE: PYTHON_${pythonVersion}_ACTIVE`;
                addLog(`Zsynchronizowano z silnikiem: Python ${pythonVersion}`, "success");
            }
        } catch(e) {
            addLog("BŁĄD: Nie można pobrać wersji silnika.", "error");
        }
    }

    async function executeCode() {
        const code = editor.getValue();
        if(!code.trim()) return addLog("Payload pusty!", "error");

        addLog("Wysyłanie pakietów do EXEC_CORE...");

        try {
            const response = await fetch('https://emkc.org/api/v2/piston/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    language: 'python',
                    version: pythonVersion,
                    files: [{ content: code }]
                })
            });

            const data = await response.json();

            if (data.run) {
                if (data.run.stdout) addLog("<b>SUCCESS:</b><br>" + data.run.stdout.replace(/\n/g, '<br>'), "success");
                if (data.run.stderr) addLog("<b>ERR:</b><br>" + data.run.stderr.replace(/\n/g, '<br>'), "error");
                if (!data.run.stdout && !data.run.stderr) addLog("Wykonano (brak wyjścia).");
            } else {
                addLog("BŁĄD: Serwer odrzucił żądanie.", "error");
            }
        } catch (error) {
            addLog("CRITICAL: Brak połączenia z API.", "error");
        }
    }

    // Inicjalizacja
    window.onload = detectVersion;
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
