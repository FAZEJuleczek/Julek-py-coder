<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JulekPy | Gamma-4 C2 Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.05); --gold: #ffae00; --err: #ff4444; --gamma: #bc13fe; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 1400px; border: 1px solid var(--neon); border-radius: 15px; padding: 20px; background: var(--card); box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); margin: auto; }
        .header { border-bottom: 2px solid var(--gamma); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 350px 1.2fr 0.8fr; gap: 15px; }
        .card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; min-height: 550px; display: flex; flex-direction: column; position: relative; }
        .label { font-size: 10px; color: var(--gamma); letter-spacing: 2px; margin-bottom: 15px; display: block; text-transform: uppercase; border-bottom: 1px solid var(--gamma); padding-bottom: 5px; }
        #mission-box { color: #00ff41; font-size: 13px; line-height: 1.6; }
        #editor { flex-grow: 1; border-radius: 5px; border: 1px solid rgba(188, 19, 254, 0.3); font-size: 14px; }
        #terminal-stream { overflow-y: auto; flex-grow: 1; max-height: 480px; font-size: 12px; }
        .item { padding: 8px; margin-bottom: 8px; border-radius: 4px; border-left: 2px solid var(--neon); background: rgba(0, 242, 255, 0.03); animation: slideIn 0.3s ease; }
        .success-item { border-left-color: var(--gold); background: rgba(255, 174, 0, 0.05); }
        .btn-execute { background: transparent; border: 1px solid var(--gamma); color: var(--gamma); padding: 12px; margin-top: 15px; cursor: pointer; font-family: 'Consolas', monospace; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-execute:hover:not(:disabled) { background: var(--gamma); color: #fff; box-shadow: 0 0 20px var(--gamma); }
        .btn-execute:disabled { opacity: 0.2; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div style="color: var(--gamma); font-weight: bold; letter-spacing: 3px;">JULEKPY_v2.3_GAMMA_LINK</div>
            <div id="status-line" style="font-size: 8px; color: var(--neon); margin-top: 4px;">UPLINK: WAITING...</div>
        </div>
        <div id="clock" style="font-size: 10px; opacity: 0.6;">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card">
            <span class="label">● GAMMA_4_MISSIONS</span>
            <div id="mission-box">Nawiązywanie łączności z API Gemini Gamma-4...</div>
            <div style="margin-top: 20px;">
                <button class="btn-execute" onclick="fetchMission()" style="font-size: 10px; width: 100%;">FORCE_SYNC_C2</button>
            </div>
        </div>

        <div class="card">
            <span class="label">● PAYLOAD_EDITOR</span>
            <div id="editor"># System zainicjowany.
# Oczekiwanie na wstrzyknięcie misji...</div>
            <button class="btn-execute" id="run-btn" onclick="executeCode()" disabled>Engine Offline</button>
        </div>

        <div class="card">
            <span class="label">● GAMMA_TERMINAL</span>
            <div id="terminal-stream">
                <div class="item">Wczytywanie modułów Gamma 4...</div>
            </div>
        </div>
    </div>
</div>

<script>
    var editor = ace.edit("editor");
    editor.setTheme("ace/theme/monokai");
    editor.session.setMode("ace/mode/python");
    editor.setOptions({ showPrintMargin: false, fontFamily: "Consolas", fontSize: "14px" });

    let pyodide;

    function addLog(text, type = 'normal') {
        const stream = document.getElementById('terminal-stream');
        const item = document.createElement('div');
        item.className = `item ${type === 'success' ? 'success-item' : ''}`;
        item.innerHTML = `[${new Date().toLocaleTimeString()}] ${text}`;
        stream.prepend(item); 
    }

    // Łącze z moją bazą misji (Gamma-4 API)
    async function fetchMission() {
        document.getElementById('status-line').innerText = "UPLINK: SYNCING_WITH_GAMMA_4";
        try {
            // Używamy publicznego proxy do pobrania misji z mojego gista
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://pastebin.com/raw/L1N3R9v4'));
            const dataRaw = await response.json();
            const data = JSON.parse(dataRaw.contents);

            document.getElementById('mission-box').innerHTML = `
                <b style="color:var(--gold)">MISJA: ${data.id}</b><br>
                <span style="font-size:14px;">${data.title}</span><br><br>
                ${data.description}
            `;
            
            // Wstaw kod jeśli edytor jest w stanie spoczynku
            if (editor.getValue().includes("System zainicjowany")) {
                editor.setValue(data.template);
            }

            document.getElementById('status-line').innerText = "UPLINK: GAMMA_CONNECTED";
            addLog("Odebrano dane od Gamma-4.", "success");
        } catch (err) {
            addLog("Błąd Uplinku. Sprawdź status C2.", "error");
        }
    }

    async function initPython() {
        try {
            pyodide = await loadPyodide();
            document.getElementById('run-btn').disabled = false;
            document.getElementById('run-btn').innerText = "Run Payload";
            addLog("Lokalny silnik Python READY.", "success");
            fetchMission();
        } catch (e) { addLog("Błąd inicjalizacji.", "error"); }
    }

    async function executeCode() {
        const code = editor.getValue();
        addLog("Gamma-4 Executing...");
        pyodide.setStdout({ batched: (str) => { addLog("<br><b>[OUTPUT]</b>:<br>" + str.replace(/\n/g, '<br>'), "success"); } });
        try { await pyodide.runPythonAsync(code); } 
        catch (err) { addLog("<br><b>[ERROR]</b>: " + err.message); }
    }

    window.onload = initPython;
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>

</body>
</html>
