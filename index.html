<!DOCTYPE html>
<html lang="pl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JulekPy | Professional Learning</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .ace_editor { border-radius: 8px; }
        .locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        .sidebar-item { transition: all 0.2s; border-left: 4px solid transparent; }
        .sidebar-item.active { border-left-color: #38bdf8; background: #1e293b; }
        .mission-complete { border-left-color: #10b981 !important; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <header class="h-14 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-900">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center font-bold text-white">J</div>
            <span class="font-bold tracking-tight text-slate-200">JulekPy <span class="text-sky-500">v2.6</span></span>
        </div>
        <div class="flex items-center gap-4 text-sm font-medium">
            <span id="streak" class="text-orange-400">🔥 1 Day Streak</span>
            <div class="h-2 w-32 bg-slate-700 rounded-full overflow-hidden">
                <div id="total-progress" class="h-full bg-sky-500 transition-all" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-[300px_1fr_350px] overflow-hidden">
        
        <aside class="border-right border-slate-800 bg-slate-900/50 p-4 flex flex-col gap-4 overflow-y-auto">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest px-2">Mapa Kursu</h2>
            <div id="mission-list" class="flex flex-col gap-2">
                </div>
        </aside>

        <section class="flex flex-col bg-slate-950 p-4 gap-4">
            <div class="flex items-center justify-between px-2">
                <h1 id="current-title" class="text-lg font-bold">Wybierz lekcję</h1>
                <button id="run-btn" onclick="executeCode()" disabled class="bg-sky-600 hover:bg-sky-500 disabled:opacity-30 text-white px-6 py-2 rounded-lg font-bold transition-all flex items-center gap-2">
                    <span>Uruchom i Sprawdź</span>
                    <kbd class="text-[10px] bg-sky-800 px-1.5 py-0.5 rounded">Ctrl+Enter</kbd>
                </button>
            </div>
            <div id="mission-desc" class="bg-slate-900 border border-slate-800 p-4 rounded-xl text-slate-300 text-sm leading-relaxed">
                Wybierz misję z panelu po lewej, aby rozpocząć naukę.
            </div>
            <div id="editor" class="flex-1 shadow-2xl"></div>
        </section>

        <aside class="border-l border-slate-800 bg-slate-900 p-4 flex flex-col gap-4">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Konsola Systemowa</h2>
            <div id="terminal" class="flex-1 font-mono text-sm overflow-y-auto bg-black/40 p-4 rounded-lg border border-slate-800 flex flex-col gap-2">
                <div class="text-slate-500 italic">Ładowanie jądra Python...</div>
            </div>
            <div id="success-card" class="hidden bg-emerald-500/10 border border-emerald-500/50 p-4 rounded-xl">
                <div class="text-emerald-400 font-bold flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Misja Ukończona!
                </div>
                <p class="text-emerald-300/80 text-xs mt-1">Gratulacje! Odblokowano następny poziom.</p>
            </div>
        </aside>
    </main>

    <script>
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/cloud_editor_dark");
        editor.session.setMode("ace/mode/python");
        editor.setOptions({ fontSize: "15px", showPrintMargin: false });

        let pyodide;
        let activeIdx = null;
        const MISSIONS = [
            { id: 1, title: "Zmienne: Startup", desc: "Stwórz zmienną o nazwie <b>name</b> i przypisz jej wartość <b>'Julek'</b>. Następnie wypisz ją (print).", template: "# Tu wpisz kod\n", expected: "Julek", unlocked: true },
            { id: 2, title: "Liczby: Kalkulator", desc: "Stwórz zmienną <b>a</b> równą 10 i <b>b</b> równą 5. Wypisz ich sumę.", template: "a = 10\nb = 5\n# Wypisz sumę a + b\n", expected: "15", unlocked: false },
            { id: 3, title: "Listy: Archiwum", desc: "Wypisz trzeci element z listy: <b>['A', 'B', 'C', 'D']</b>", template: "baza = ['A', 'B', 'C', 'D']\n# Pamiętaj: liczmy od 0!\n", expected: "C", unlocked: false }
        ];

        function renderMap() {
            const list = document.getElementById('mission-list');
            list.innerHTML = '';
            MISSIONS.forEach((m, i) => {
                const btn = document.createElement('div');
                btn.className = `sidebar-item p-3 rounded-lg cursor-pointer ${m.unlocked ? '' : 'locked'} ${activeIdx === i ? 'active' : ''}`;
                btn.onclick = () => m.unlocked && loadMission(i);
                btn.innerHTML = `<div class="text-xs text-slate-500 font-bold">LEKCJA 0${m.id}</div><div class="text-sm font-medium">${m.title}</div>`;
                list.appendChild(btn);
            });
            document.getElementById('total-progress').style.width = (MISSIONS.filter(m => !m.unlocked).length === 0 ? 100 : (MISSIONS.filter(m => !m.unlocked).length === MISSIONS.length ? 0 : 33)) + '%';
        }

        function loadMission(idx) {
            activeIdx = idx;
            const m = MISSIONS[idx];
            document.getElementById('current-title').innerText = m.title;
            document.getElementById('mission-desc').innerHTML = m.desc;
            editor.setValue(m.template);
            document.getElementById('success-card').classList.add('hidden');
            renderMap();
        }

        async function init() {
            pyodide = await loadPyodide();
            document.getElementById('run-btn').disabled = false;
            addLog("System gotowy do pracy.", "text-sky-400");
            renderMap();
            loadMission(0);
        }

        function addLog(msg, color = "text-slate-300") {
            const term = document.getElementById('terminal');
            const entry = document.createElement('div');
            entry.className = color;
            entry.innerHTML = `<span class="text-slate-600 mr-2">></span>${msg}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        async function executeCode() {
            let output = "";
            pyodide.setStdout({ batched: (str) => { output += str.trim(); } });
            addLog("Uruchamianie...", "text-slate-500");

            try {
                await pyodide.runPythonAsync(editor.getValue());
                addLog(output || "Brak outputu", "text-white font-bold");

                if (output === MISSIONS[activeIdx].expected) {
                    addLog("Weryfikacja: POPRAWNA", "text-emerald-400");
                    document.getElementById('success-card').classList.remove('hidden');
                    if (MISSIONS[activeIdx + 1]) MISSIONS[activeIdx + 1].unlocked = true;
                    renderMap();
                } else {
                    addLog("Weryfikacja: BŁĘDNA. Oczekiwano: " + MISSIONS[activeIdx].expected, "text-rose-400");
                }
            } catch (e) {
                addLog("BŁĄD KODU: " + e.message, "text-rose-500");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
